<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<style>
  :root {
    --bg: #111110;
    --surface: rgba(255,255,255,0.04);
    --text: #e8e0d5;
    --text-muted: #9a9288;
    --vermillion: #c33c2c;
    --vermillion-glow: rgba(195, 60, 44, 0.35);
    --jade: #5b8c7a;
    --jade-glow: rgba(91, 140, 122, 0.35);
    --plum: #6b5078;
    --plum-glow: rgba(107, 80, 120, 0.35);
    --divider: rgba(255,255,255,0.08);
    --ring-bg: rgba(255,255,255,0.05);
    --dot-bg: rgba(255,255,255,0.08);
    --btn-ghost-hover: rgba(255,255,255,0.08);
    --tab-hover: rgba(255,255,255,0.06);
  }

  /* 浅色主题 */
  body.light {
    --bg: #f5f0e8;
    --surface: rgba(0,0,0,0.03);
    --text: #2c2418;
    --text-muted: #6a6050;
    --vermillion: #b83a2a;
    --vermillion-glow: rgba(184, 58, 42, 0.2);
    --jade: #4a7a68;
    --jade-glow: rgba(74, 122, 104, 0.2);
    --plum: #5e4670;
    --plum-glow: rgba(94, 70, 112, 0.2);
    --divider: rgba(0,0,0,0.08);
    --ring-bg: rgba(0,0,0,0.05);
    --dot-bg: rgba(0,0,0,0.08);
    --btn-ghost-hover: rgba(0,0,0,0.06);
    --tab-hover: rgba(0,0,0,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Microsoft YaHei UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif;
    font-size: 15px;
    background: transparent;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    border-radius: 12px;
    overflow: hidden;
  }

  /* 背景层 */
  .bg-layer {
    position: fixed; inset: 0; border-radius: 12px; z-index: -3;
    background: var(--bg);
    transition: background 0.5s;
  }
  .bg-texture {
    position: fixed; inset: 0; border-radius: 12px; z-index: -2;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
  body.light .bg-texture { opacity: 0.06; }
  .bg-ink {
    position: fixed; inset: 0; border-radius: 12px; z-index: -1;
    background: radial-gradient(ellipse at 50% 35%, rgba(195,60,44,0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 80%, rgba(91,140,122,0.04) 0%, transparent 40%);
    transition: opacity 0.8s;
  }
  body.break .bg-ink {
    background: radial-gradient(ellipse at 50% 35%, rgba(91,140,122,0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 15% 80%, rgba(107,80,120,0.04) 0%, transparent 40%);
  }
  body.long-break .bg-ink {
    background: radial-gradient(ellipse at 50% 35%, rgba(107,80,120,0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(184,148,76,0.04) 0%, transparent 40%);
  }

  /* 标题栏 */
  .titlebar {
    position: fixed; top: 0; left: 0; right: 0; height: 38px;
    -webkit-app-region: drag; display: flex;
    align-items: center; justify-content: space-between;
    padding: 0 12px; z-index: 10;
  }
  .titlebar-label {
    font-size: 0.7rem; color: var(--text-muted);
    letter-spacing: 0.25em; font-weight: 400;
  }
  .titlebar-actions {
    -webkit-app-region: no-drag; display: flex; gap: 2px; align-items: center;
  }
  .tb-btn {
    width: 28px; height: 24px; border: none; border-radius: 4px;
    cursor: pointer; font-size: 0.65rem; color: var(--text-muted);
    background: transparent; transition: all 0.25s; font-family: inherit;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .tb-btn:hover { background: var(--btn-ghost-hover); color: var(--text); }
  .tb-btn.pin.active { color: var(--vermillion); }

  .container {
    width: 100%; max-width: 380px;
    padding: 2.5rem 1.8rem 1.8rem;
    margin-top: 6px;
  }

  /* 模式标签 — 始终可见的文字按钮 */
  .mode-tabs {
    display: flex; gap: 0; justify-content: center;
    margin-bottom: 2.2rem;
    border-bottom: 1px solid var(--divider);
  }
  .mode-tab {
    padding: 10px 20px;
    border: none; background: transparent;
    color: var(--text-muted);
    cursor: pointer; font-family: inherit;
    font-size: 0.9rem; font-weight: 400;
    letter-spacing: 0.06em;
    position: relative; transition: color 0.3s;
    -webkit-app-region: no-drag;
  }
  .mode-tab:hover { color: var(--text); }
  .mode-tab.active {
    color: var(--vermillion); font-weight: 600;
  }
  .mode-tab.active::after {
    content: ''; position: absolute; bottom: -1px; left: 8px; right: 8px;
    height: 2px; background: var(--vermillion);
  }
  body.break .mode-tab.active { color: var(--jade); }
  body.break .mode-tab.active::after { background: var(--jade); }
  body.long-break .mode-tab.active { color: var(--plum); }
  body.long-break .mode-tab.active::after { background: var(--plum); }

  /* 计时器区域 */
  .timer-section {
    position: relative;
    width: 280px; height: 280px;
    margin: 0 auto 2.2rem;
  }

  .timer-ring {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body.running .timer-ring {
    animation: breathe 5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.025); }
  }

  svg { transform: rotate(-90deg); width: 100%; height: 100%; }

  .bg-circle {
    fill: none;
    stroke: var(--ring-bg);
    stroke-width: 5;
  }

  .progress-circle {
    fill: none;
    stroke: var(--vermillion);
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
    filter: drop-shadow(0 0 8px var(--vermillion-glow));
  }
  body.running .progress-circle {
    filter: drop-shadow(0 0 16px var(--vermillion-glow));
  }
  .progress-circle.break {
    stroke: var(--jade);
    filter: drop-shadow(0 0 8px var(--jade-glow));
  }
  body.running .progress-circle.break {
    filter: drop-shadow(0 0 16px var(--jade-glow));
  }
  .progress-circle.long-break {
    stroke: var(--plum);
    filter: drop-shadow(0 0 8px var(--plum-glow));
  }
  body.running .progress-circle.long-break {
    filter: drop-shadow(0 0 16px var(--plum-glow));
  }

  /* 时间数字 */
  .time-display {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cascadia Code', 'Consolas', 'SF Mono', 'Menlo', 'Courier New', monospace;
    font-size: 4.2rem; font-weight: 400; letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    transition: transform 0.25s ease, color 0.5s;
  }
  .time-display.flip { transform: translate(-50%, -50%) scale(1.1); }

  /* 控制按钮 */
  .controls {
    display: flex; gap: 16px; justify-content: center;
    margin-bottom: 2rem;
  }

  .btn {
    padding: 0; border: none; cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-family: inherit;
    letter-spacing: 0.08em;
    -webkit-app-region: no-drag;
  }
  .btn:active { transform: scale(0.96); }

  .btn-main {
    width: 130px; height: 46px;
    border-radius: 2px;
    background: transparent;
    color: var(--vermillion);
    font-size: 0.95rem; font-weight: 600;
    border: 1.5px solid var(--vermillion);
    position: relative; overflow: hidden;
  }
  .btn-main::after {
    content: ''; position: absolute; inset: 0;
    background: var(--vermillion);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: -1;
  }
  .btn-main:hover { color: #fff; }
  .btn-main:hover::after { transform: scaleX(1); }

  body.break .btn-main { color: var(--jade); border-color: var(--jade); }
  body.break .btn-main::after { background: var(--jade); }
  body.long-break .btn-main { color: var(--plum); border-color: var(--plum); }
  body.long-break .btn-main::after { background: var(--plum); }

  .btn-ghost {
    width: 46px; height: 46px;
    border-radius: 2px;
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid transparent;
    font-size: 0.85rem; font-weight: 400;
  }
  .btn-ghost:hover {
    border-color: var(--divider);
    color: var(--text);
  }

  /* 底部信息 */
  .footer {
    text-align: center;
    border-top: 1px solid var(--divider);
    padding-top: 1.2rem;
  }
  .count-line {
    font-size: 0.75rem; color: var(--text-muted);
    letter-spacing: 0.06em; margin-bottom: 0.6rem;
  }
  .count-line em {
    font-style: normal; color: var(--vermillion);
    font-size: 1.1rem; font-weight: 700; margin: 0 2px;
  }
  .dots {
    display: flex; gap: 7px; justify-content: center;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dot-bg);
    transition: all 0.3s;
  }
  .dot.done {
    background: var(--vermillion);
    animation: dotIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes dotIn {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.6); }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-texture"></div>
<div class="bg-ink"></div>

<!-- 标题栏 -->
<div class="titlebar">
  <span class="titlebar-label">番 茄 钟</span>
  <div class="titlebar-actions">
    <button class="tb-btn" id="themeBtn" title="切换浅色/深色">◐</button>
    <button class="tb-btn pin" id="pinBtn" title="置顶">◉</button>
    <button class="tb-btn" id="minBtn" title="最小化">—</button>
    <button class="tb-btn" id="closeBtn" title="关闭">✕</button>
  </div>
</div>

<div class="container">

  <!-- 模式切换 -->
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="work">专注 </button>
    <button class="mode-tab" data-mode="short-break">小休 </button>
    <button class="mode-tab" data-mode="long-break">长休 </button>
  </div>

  <!-- 计时环 -->
  <div class="timer-section">
    <div class="timer-ring">
      <svg viewBox="0 0 280 280">
        <circle class="bg-circle" cx="140" cy="140" r="132"/>
        <circle class="progress-circle" id="progress" cx="140" cy="140" r="132"
                stroke-dasharray="829.4" stroke-dashoffset="0"/>
      </svg>
      <div class="time-display" id="time">25:00</div>
    </div>
  </div>

  <!-- 按钮 -->
  <div class="controls">
    <button class="btn btn-main" id="btnToggle">開 始</button>
    <button class="btn btn-ghost" id="btnReset">↺</button>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <div class="count-line">
      今日 <em id="count">0</em> 个番茄
    </div>
    <div class="dots" id="dots"></div>
  </div>
</div>

<script>
  const MODES = {
    work:         { label: '专注', minutes: 25 },
    'short-break':{ label: '小休', minutes: 5 },
    'long-break': { label: '长休', minutes: 15 },
  };

  const CIRCUMFERENCE = 2 * Math.PI * 132;

  let mode = 'work';
  let totalSeconds = MODES[mode].minutes * 60;
  let remaining = totalSeconds;
  let running = false;
  let interval = null;
  let pomodoroCount = 0;

  const $time = document.getElementById('time');
  const $progress = document.getElementById('progress');
  const $btnToggle = document.getElementById('btnToggle');
  const $btnReset = document.getElementById('btnReset');
  const $count = document.getElementById('count');
  const $dots = document.getElementById('dots');
  const $modes = document.querySelectorAll('.mode-tab');

  function fmt(s) {
    return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  }

  function setOffset(frac) {
    $progress.style.strokeDashoffset = CIRCUMFERENCE * (1 - frac);
  }

  function updateDisplay() {
    $time.textContent = fmt(remaining);
    setOffset(remaining / totalSeconds);
    document.title = fmt(remaining) + ' — 番茄钟';
    window.electronAPI?.updateTray('🍅 ' + fmt(remaining) + ' — ' + MODES[mode].label);
  }

  function tick() {
    remaining--;
    updateDisplay();
    if (remaining <= 0) { stopTimer(); onComplete(); }
  }

  function startTimer() {
    running = true;
    document.body.classList.add('running');
    interval = setInterval(tick, 1000);
    $btnToggle.textContent = '暫 停';
  }

  function stopTimer() {
    running = false;
    document.body.classList.remove('running');
    clearInterval(interval);
    interval = null;
    $btnToggle.textContent = '開 始';
  }

  function toggleTimer() { running ? stopTimer() : startTimer(); }

  function resetAnimation(fn) {
    $progress.style.transition = 'none';
    fn();
    void $progress.offsetHeight;
    $progress.style.transition = 'stroke-dashoffset 1s linear';
  }

  const sound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACAf39/f4B/f3+AgH9/f3+Af39/gIB/f39/gH9/f3+Af39/gIB/f39/gH9/f3+Af39/gIB/f39/gH9/f3+Af39/gIB/f39/gH9/f3+Af39/gIB/f39/gH9/f3+Af39/gH9/f3+Af3+AgH9/f39/gH9/f3+Af39/gIB/f39/gH9/f3+Af39/gIB/f39/gH9/f3+Af39/gH9/f3+AgICAgICAgICAA==');

  function onComplete() {
    try { sound.currentTime = 0; sound.play().catch(()=>{}); } catch(e) {}
    window.electronAPI?.sendNotification('🍅 时间到！', '番茄钟计时完成，休息一下吧。');
    if (mode === 'work') { pomodoroCount++; $count.textContent = pomodoroCount; renderDots(); }
    switchMode(mode === 'work' ? 'short-break' : 'work');
  }

  function reset() {
    stopTimer();
    remaining = totalSeconds;
    resetAnimation(() => updateDisplay());
    $btnToggle.textContent = '開 始';
  }

  function switchMode(newMode) {
    stopTimer();
    mode = newMode;
    totalSeconds = MODES[mode].minutes * 60;
    remaining = totalSeconds;

    $time.classList.add('flip');
    setTimeout(() => $time.classList.remove('flip'), 250);

    document.body.classList.remove('break', 'long-break');
    if (mode !== 'work') document.body.classList.add(mode);

    resetAnimation(() => updateDisplay());

    $modes.forEach(el => {
      el.classList.toggle('active', el.dataset.mode === mode);
    });

    $progress.classList.remove('break', 'long-break');
    if (mode === 'short-break') $progress.classList.add('break');
    if (mode === 'long-break') $progress.classList.add('long-break');
  }

  function renderDots() {
    let html = '';
    for (let i = 0; i < Math.max(pomodoroCount, 8); i++) {
      html += '<div class="dot' + (i < pomodoroCount ? ' done' : '') + '"></div>';
    }
    $dots.innerHTML = html;
  }

  // 事件
  $btnToggle.addEventListener('click', toggleTimer);
  $btnReset.addEventListener('click', reset);
  $modes.forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.mode !== mode) switchMode(el.dataset.mode);
    });
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'KeyS') { e.preventDefault(); toggleTimer(); }
    if (e.code === 'KeyR') reset();
    if (e.code === 'Digit1') switchMode('work');
    if (e.code === 'Digit2') switchMode('short-break');
    if (e.code === 'Digit3') switchMode('long-break');
  });

  document.getElementById('minBtn').addEventListener('click', () => window.electronAPI?.minimize());
  document.getElementById('closeBtn').addEventListener('click', () => window.electronAPI?.close());

  // 主题切换
  const themeBtn = document.getElementById('themeBtn');
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
  }
  themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('light');
    localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  });

  // 置顶
  let pinned = false;
  document.getElementById('pinBtn').addEventListener('click', () => {
    pinned = !pinned;
    document.getElementById('pinBtn').classList.toggle('active', pinned);
    window.electronAPI?.setAlwaysOnTop(pinned);
  });

  renderDots();
  updateDisplay();
</script>
</body>
</html>
